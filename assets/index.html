<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebView2 Tabulator Grid</title>
    
    <!-- Tabulator CSS (Dark Theme to match the background) -->
    <link href="https://unpkg.com/tabulator-tables/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    
    <!-- AG Grid CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem;
            background: linear-gradient(to right, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1rem; color: rgba(255,255,255,0.7);
        }

        /* Container for the UI elements */
        .wrapper {
            width: 100%;
            max-width: 1600px;
        }

        .grid-container {
            background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            animation: fadeInUp 1s ease-out;
            margin-bottom: 20px;
        }

        .grids-wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
        }

        .grid-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .grid-title {
            font-size: 1.2rem;
            text-align: center;
            font-weight: 600;
            color: #fff;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 6px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        /* ... existing buttons ... */
        .btn {
            display: inline-block; padding: 10px 20px;
            background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
            color: #fff; border: none; border-radius: 8px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 176, 155, 0.3);
            display: flex; align-items: center; gap: 8px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 176, 155, 0.5); }
        .btn:active { transform: translateY(0); }

        .btn-blue {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .btn-blue:hover { box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5); }

        .btn-danger {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }
        .btn-danger:hover { box-shadow: 0 6px 20px rgba(245, 87, 108, 0.5); }

        .select-box {
            padding: 10px 12px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
        }
        .select-box option {
            background: #24243e;
            color: #fff;
        }

        /* The grids */
        #example-table {
            border-radius: 8px;
            overflow: hidden;
            border: none;
            height: 360px; /* 헤더 + 약 9개 행 높이 (나머지는 스크롤) */
        }
        #myGrid {
            border-radius: 8px;
            overflow: hidden;
            border: none;
            height: 450px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>WebView2 Grid Integration</h1>
        <p class="subtitle">Powered by Tabulator & SheetJS (Excel Export)</p>
    </div>

    <div class="wrapper">
        <div class="grid-container">
            <div class="toolbar">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="add-mode" class="select-box">
                        <option value="append">⬇️ Append (하단에 붙이기)</option>
                        <option value="insert">⬆️ Insert (상단에 밀어넣기)</option>
                    </select>
                    <button class="btn btn-blue" id="add-row-btn">➕ Add</button>
                    <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.2); margin: 0 5px;"></div>
                    <span style="font-size:0.9rem; color:rgba(255,255,255,0.8);">🚀 Stream:</span>
                    <input type="number" id="stream-count" class="select-box" style="width: 70px; padding: 8px;" value="10" min="1">
                    <span style="font-size:0.9rem; color:rgba(255,255,255,0.8);">/ sec</span>
                    <button class="btn btn-blue" id="stream-toggle-btn">▶️ Start</button>
                </div>
                <button class="btn" id="download-xlsx">📊 Download Excel</button>
            </div>
            
            <div class="grids-wrapper">
                <!-- Tabulator Grid -->
                <div class="grid-box">
                    <div class="grid-title">Tabulator V5</div>
                    <div id="example-table"></div>
                </div>

                <!-- AG Grid -->
                <div class="grid-box">
                    <div class="grid-title">AG Grid</div>
                    <div id="myGrid" class="ag-theme-alpine-dark"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- SheetJS (Excel Export Library) -->
    <script src="https://oss.sheetjs.com/sheetjs/xlsx.full.min.js"></script>
    
    <!-- Tabulator JS -->
    <script src="https://unpkg.com/tabulator-tables/dist/js/tabulator.min.js"></script>

    <!-- AG Grid JS -->
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>

    <script>
        // 샘플 데이터
        var tableData = [
            { id: 1, name: "Billy Bob", age: 12, gender: "male", height: 1.4, col: "red", dob: "2010-01-20" },
            { id: 2, name: "Mary May", age: 1, gender: "female", height: 1.1, col: "blue", dob: "2021-05-14" },
            { id: 3, name: "Christine Lobowski", age: 42, height: 1.6, col: "green", dob: "1980-05-22" },
            { id: 4, name: "Brendon Philips", age: 125, gender: "male", height: 1.9, col: "orange", dob: "1897-08-01" },
            { id: 5, name: "Margret Marmajuke", age: 16, gender: "female", height: 1.0, col: "yellow", dob: "2006-01-31" },
            { id: 6, name: "Frank Sinatra", age: 82, gender: "male", height: 1.7, col: "blue", dob: "1915-12-12" },
            { id: 7, name: "Steve Jobs", age: 56, gender: "male", height: 1.88, col: "black", dob: "1955-02-24" }
        ];

        // Tabulator 그리드 객체 생성
        var table = new Tabulator("#example-table", {
            data: [...tableData],      // 로드할 데이터 (독립성 유지 위해 복사본)
            height: 360,               // 딱 9개 행 크기로 고정 (나머지는 가상 스크롤)
            layout:"fitColumns",       // 칼럼 너비 자동 맞춤
            responsiveLayout:"hide",   // 좁아질 때 넘치는 칼럼 숨김
            history:false,             // 성능 개선
            movableColumns: true,      // 칼럼 이동 가능
            columns:[                  // 칼럼 정의
                {title:"ID", field:"id", width:70, hozAlign:"center"},
                {title:"Name", field:"name", width:200, editor:"input"}, // 에디터 활성화 (더블클릭/클릭시 편집가능)
                {title:"Age", field:"age", hozAlign:"left", formatter:"progress", editor:"number"},
                {title:"Gender", field:"gender", editor:"list", editorParams:{values:{"male":"Male", "female":"Female", "unknown":"Unknown"}}},
                {title:"Height", field:"height", hozAlign:"center", editor:"number"},
                {title:"Color", field:"col", editor:"input"},
                {title:"Date Of Birth", field:"dob", hozAlign:"center", editor:"date"}
            ],
        });

        // ----------------------------------------------------
        // AG Grid 초기화 설정
        // ----------------------------------------------------
        var agColumnDefs = [
            { headerName: "ID", field: "id", width: 70 },
            { headerName: "Name", field: "name", width: 200 },
            { headerName: "Age", field: "age", width: 120 },
            { headerName: "Gender", field: "gender", width: 100 },
            { headerName: "Height", field: "height", width: 100 },
            { headerName: "Color", field: "col", width: 100 },
            { headerName: "Date Of Birth", field: "dob", width: 150 }
        ];

        var agGridOptions = {
            theme: "legacy", // V33+ 부터 CSS 파일 테마 사용시 'legacy' 선언 필수
            columnDefs: agColumnDefs,
            rowData: [...tableData],
            defaultColDef: {
                resizable: true,
                sortable: true
            },
            // 트랜잭션 등 벌크 업데이트 허용
            asyncTransactionWaitMillis: 50,
            animateRows: false // 대용량 스트리밍시 애니메이션 안함
        };

        var agGridElement = document.querySelector('#myGrid');
        // 최신 버전의 AG Grid(v31+)에 맞추어 createGrid 함수를 사용합니다.
        var gridApi = agGrid.createGrid(agGridElement, agGridOptions);

        // C++ -> JS 연동 (ExecuteScript 전용 전역 함수)
        window.loadGridData = function(jsonData) {
            table.setData(jsonData);
            
            // AG Grid 초기화
            gridApi.setGridOption('rowData', jsonData);
        };

        var isRendering = false; // 실시간 렌더링 프레임 제어

        window.appendGridData = function(jsonData) {
            try {
                var mode = document.getElementById("add-mode").value;
                
                // --- Tabulator 데이터 삽입 ---
                var p = (mode === "insert") ? 
                        table.addData(jsonData.slice().reverse(), true) : 
                        table.addData(jsonData, false);
                p.catch(function(){}); 

                // --- AG Grid 데이터 삽입 (트랜잭션 방식) ---
                if (mode === "insert") {
                    gridApi.applyTransaction({ add: jsonData.slice().reverse(), addIndex: 0 });
                } else {
                    gridApi.applyTransaction({ add: jsonData });
                }

                // 폭포수 스크롤 (두 그리드 모두 적용)
                if (!isRendering) {
                    isRendering = true;
                    requestAnimationFrame(function() {
                        // 1. Tabulator
                        try { table.redraw(true); } catch(e) {}
                        try {
                            var tabRows = table.getRows();
                            if (tabRows.length > 0) {
                                var targetRow = (mode === "insert") ? tabRows[0] : tabRows[tabRows.length - 1];
                                table.scrollToRow(targetRow, (mode === "insert" ? "top" : "bottom"), false);
                            }
                        } catch(e) {}
                        
                        // 2. AG Grid 스크롤 이동
                        try {
                            if (mode === "insert") {
                                gridApi.ensureIndexVisible(0, 'top');
                            } else {
                                var lastIndex = gridApi.getDisplayedRowCount() - 1;
                                gridApi.ensureIndexVisible(lastIndex, 'bottom');
                            }
                        } catch(e) {}
                        
                        isRendering = false; // 다음 프레임 허용
                    });
                }
            } catch(e) {
                console.error("appendGridData error:", e);
            }
        };

        // ----------------------------------------------------
        // UI 이벤트 핸들러 복구
        // ----------------------------------------------------

        // 엑셀 다운로드 버튼 클릭 이벤트
        document.getElementById("download-xlsx").addEventListener("click", function(){
            table.download("xlsx", "WebView2_Data.xlsx", {sheetName:"My Data"});
            // AG Grid 엑셀 추출: gridApi.exportDataAsExcel() 필요시 추가 (AG Grid Enterprise 필요)
            
            if(window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage("Excel 다운로드가 실행되었습니다.");
            }
        });

        // 수동 추가 버튼
        document.getElementById("add-row-btn").addEventListener("click", function(){
            var count = parseInt(document.getElementById("stream-count").value) || 10;
            if(window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage("ADD_MORE_DATA:" + count);
            }
        });

        // 실시간 스트리밍 버튼 (초당 10~100건 랜덤)
        var streamTimeout = null;
        var streamBtn = document.getElementById("stream-toggle-btn");
        streamBtn.addEventListener("click", function(){
            if (streamTimeout) {
                clearTimeout(streamTimeout);
                streamTimeout = null;
                streamBtn.innerHTML = "▶️ Start";
                streamBtn.classList.remove("btn-danger");
                streamBtn.classList.add("btn-blue");
            } else {
                streamBtn.innerHTML = "⏹️ Stop";
                streamBtn.classList.remove("btn-blue");
                streamBtn.classList.add("btn-danger");
                
                function nextTick() {
                    // 매 틱마다 초당 10건 ~ 100건 사이의 랜덤한 목표 속도를 설정합니다.
                    var randomRate = Math.floor(Math.random() * (100 - 10 + 1)) + 10;
                    
                    // 해당 속도에 맞춰 이번 데이터 1~소수 개를 가져오기 위한 지연 시간 계산
                    var tickInterval = Math.max(16, Math.floor(1000 / randomRate));
                    var itemsPerTick = Math.max(1, Math.ceil(randomRate * tickInterval / 1000));

                    if(window.chrome && window.chrome.webview) {
                        window.chrome.webview.postMessage("ADD_MORE_DATA:" + itemsPerTick);
                    }
                    
                    // 계산된 가변 인터벌 뒤에 다음 데이터를 요청 (유동적인 흐름 형성)
                    streamTimeout = setTimeout(nextTick, tickInterval);
                }
                
                // 첫 틱 바로 실행
                nextTick();
            }
        });

        // 페이지 준비 완료 알림
        window.addEventListener("DOMContentLoaded", function() {
            setTimeout(() => {
                if(window.chrome && window.chrome.webview) {
                    window.chrome.webview.addEventListener('message', function(event) {
                        try {
                            if (Array.isArray(event.data)) {
                                appendGridData(event.data);
                            }
                        } catch(e) {}
                    });
                    window.chrome.webview.postMessage("READY_FOR_DATA");
                }
            }, 500);
        });
    </script>
</body>
</html>
